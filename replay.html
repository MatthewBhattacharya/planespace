<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Planespace — Replay Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;color:#d0d0e8;font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden;user-select:none}

#sidebar{width:272px;min-width:272px;background:#13132a;display:flex;flex-direction:column;gap:10px;padding:14px;border-right:1px solid #1e1e3a;overflow-y:auto}
#game-area{flex:1;display:flex;align-items:center;justify-content:center;background:#0d0d1a}

h1{font-size:1.1em;letter-spacing:.12em;color:#7090cc;text-transform:uppercase;font-weight:600;border-bottom:1px solid #1e1e3a;padding-bottom:8px}

.player-card{padding:10px 12px;border-radius:8px;border:2px solid transparent;transition:box-shadow .2s}
.p0{background:rgba(70,140,210,.12);border-color:#4080c8}
.p1{background:rgba(210,70,70,.12);border-color:#c84040}
.p0.active{box-shadow:0 0 14px rgba(70,140,210,.5)}
.p1.active{box-shadow:0 0 14px rgba(210,70,70,.5)}
.player-name{font-size:.75em;text-transform:uppercase;letter-spacing:.08em;opacity:.7}
.score-val{font-size:2em;font-weight:700;line-height:1.1}
.p0 .score-val{color:#5090d8}
.p1 .score-val{color:#d85050}
.turn-badge{font-size:.7em;background:#2a2a4a;padding:2px 6px;border-radius:4px;margin-top:3px;display:inline-block}

#shape-panel{background:#0d0d1a;border:1px solid #1e1e3a;border-radius:8px;padding:10px;min-height:70px;font-size:.8em}
.shape-name{font-weight:700;color:#90b0f0;font-size:1em;margin-bottom:4px}
.breakdown-row{display:flex;justify-content:space-between;padding:1px 0;border-bottom:1px solid #1a1a30;color:#8888aa}
.breakdown-row .pts{color:#ffd060;font-weight:600}
.total-row{display:flex;justify-content:space-between;padding-top:4px;font-weight:700;font-size:1.05em;color:#ffd060}
.hint{color:#5a5a7a;font-style:italic}
.error-msg{color:#e06060}

#move-counter{font-size:.78em;color:#7080a0;text-align:center;letter-spacing:.04em}
#move-counter b{color:#c0c8e0}

.btn-row{display:flex;gap:6px}
button{flex:1;padding:9px 0;border:none;border-radius:6px;font-size:.82em;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .15s,transform .1s}
button:active:not(:disabled){transform:scale(.97)}
button:disabled{opacity:.3;cursor:not-allowed}
#btn-start{background:#2a2a4a;color:#aaa;border:1px solid #3a3a5a}
#btn-prev{background:#3a3a5a;color:#ccc}
#btn-next{background:#3a6a3a;color:#fff}
#btn-end{background:#2a2a4a;color:#aaa;border:1px solid #3a3a5a}
#btn-load{background:#1e2048;color:#8090cc;border:1px solid #3040aa;width:100%}

#status-msg{font-size:.75em;color:#5a5a7a;font-style:italic;text-align:center}

canvas{display:block}
</style>
</head>
<body>

<div id="sidebar">
  <h1>Planespace — Replay</h1>

  <button id="btn-load">📂 Load replay…</button>
  <input type="file" id="file-input" accept=".json" style="display:none">
  <div id="status-msg">Looking for replay.json…</div>

  <div class="player-card p0" id="pcard0">
    <div class="player-name">Blue Player</div>
    <div class="score-val" id="score0">0</div>
    <div class="turn-badge" id="badge0" style="display:none">Just Moved</div>
  </div>
  <div class="player-card p1" id="pcard1">
    <div class="player-name">Red Player</div>
    <div class="score-val" id="score1">0</div>
    <div class="turn-badge" id="badge1" style="display:none">Just Moved</div>
  </div>

  <div id="move-counter">Move <b id="move-cur">0</b> / <b id="move-total">0</b></div>

  <div id="shape-panel"><div class="hint">Load a replay to begin</div></div>

  <div class="btn-row">
    <button id="btn-start" disabled>⏮ Start</button>
    <button id="btn-prev" disabled>◀ Prev</button>
  </div>
  <div class="btn-row">
    <button id="btn-next" disabled>▶ Next</button>
    <button id="btn-end" disabled>⏭ End</button>
  </div>
</div>

<div id="game-area">
  <canvas id="board"></canvas>
</div>

<script>
// ===================== CONSTANTS (carried over verbatim from index.html) =====================
const COLS = 10, ROWS = 10;
const SP = 56;   // grid spacing
const PAD = 38;  // canvas padding
const CW = PAD*2 + SP*(COLS-1);  // 580
const CH = PAD*2 + SP*(ROWS-1);

const P_COLORS  = ['#4a90d8','#d84a4a'];
const P_FILL    = ['rgba(74,144,216,0.22)','rgba(216,74,74,0.22)'];
const P_NAMES   = ['Blue','Red'];

// ===================== REPLAY STATE =====================
let REPLAY = null;     // parsed JSON
let GEM_PTS = [];      // [{x,y}]
let moveIdx = 0;       // number of moves "applied" so far (0 = initial board, n = after move n)

// ===================== CANVAS =====================
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
canvas.width = CW; canvas.height = CH;

const gx = (c,r) => ({x:PAD+c*SP, y:PAD+r*SP});

function drawStar(px,py,r){
  const spikes=5, inner=r*0.42, step=Math.PI/spikes;
  let ang=-Math.PI/2;
  ctx.beginPath();
  for(let i=0;i<spikes;i++){
    ctx.lineTo(px+Math.cos(ang)*r, py+Math.sin(ang)*r); ang+=step;
    ctx.lineTo(px+Math.cos(ang)*inner, py+Math.sin(ang)*inner); ang+=step;
  }
  ctx.closePath();
}

function claimedGemsThrough(idx){
  // Set of "x,y" keys claimed by any move up to and including idx (1-based count).
  const set = new Set();
  if (!REPLAY) return set;
  for (let i=0;i<idx;i++){
    const mv = REPLAY.moves[i];
    for (const g of (mv.claimed_gems||[])) set.add(`${g[0]},${g[1]}`);
  }
  return set;
}

function render(){
  ctx.clearRect(0,0,CW,CH);

  // Background
  ctx.fillStyle='#0d0d1a'; ctx.fillRect(0,0,CW,CH);

  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.045)'; ctx.lineWidth=1;
  for(let c=0;c<COLS;c++){
    ctx.beginPath(); const p=gx(c,0); ctx.moveTo(p.x,p.y);
    const q=gx(c,ROWS-1); ctx.lineTo(q.x,q.y); ctx.stroke();
  }
  for(let r=0;r<ROWS;r++){
    ctx.beginPath(); const p=gx(0,r); ctx.moveTo(p.x,p.y);
    const q=gx(COLS-1,r); ctx.lineTo(q.x,q.y); ctx.stroke();
  }

  if (!REPLAY){
    // Still draw grid dots so it doesn't look broken before a replay loads.
    for(let c=0;c<COLS;c++){
      for(let r=0;r<ROWS;r++){
        const p=gx(c,r);
        ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
      }
    }
    return;
  }

  // Shapes placed so far (moves[0..moveIdx-1])
  for(let i=0;i<moveIdx;i++){
    const mv = REPLAY.moves[i];
    const pp = mv.verts.map(v=>gx(v[0],v[1]));
    ctx.beginPath(); ctx.moveTo(pp[0].x,pp[0].y);
    for(let k=1;k<pp.length;k++) ctx.lineTo(pp[k].x,pp[k].y);
    ctx.closePath();
    ctx.fillStyle=P_FILL[mv.player]; ctx.fill();
    ctx.strokeStyle=P_COLORS[mv.player]; ctx.lineWidth=2.2; ctx.stroke();
    // Score label at centroid
    const cx=pp.reduce((s,p)=>s+p.x,0)/pp.length;
    const cy=pp.reduce((s,p)=>s+p.y,0)/pp.length;
    ctx.font='bold 11px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillText(mv.total, cx+1, cy+1);
    ctx.fillStyle=P_COLORS[mv.player];
    ctx.fillText(mv.total, cx, cy);
  }

  // Gem points
  const claimed = claimedGemsThrough(moveIdx);
  for(const g of GEM_PTS){
    const p=gx(g.x,g.y);
    const isClaimed = claimed.has(`${g.x},${g.y}`);
    drawStar(p.x,p.y,10);
    ctx.fillStyle=isClaimed?'#55555f':'#f0c030'; ctx.fill();
    ctx.strokeStyle=isClaimed?'#2a2a30':'#a07800'; ctx.lineWidth=1; ctx.stroke();
  }

  // Grid dots (skip gem points, same as index.html)
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS;r++){
      const isGem=GEM_PTS.some(g=>g.x===c&&g.y===r);
      if(isGem) continue;
      const p=gx(c,r);
      ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
    }
  }

  // Highlight the vertices of the *current* move (the one just placed)
  if (moveIdx > 0){
    const mv = REPLAY.moves[moveIdx-1];
    for (const v of mv.verts){
      const p = gx(v[0], v[1]);
      ctx.beginPath(); ctx.arc(p.x,p.y,7,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,100,.8)'; ctx.lineWidth=2; ctx.stroke();
    }
  }
}

// ===================== UI =====================
function updateUI(){
  if (!REPLAY){
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-end').disabled = true;
    return;
  }

  const total = REPLAY.moves.length;
  document.getElementById('move-cur').textContent = moveIdx;
  document.getElementById('move-total').textContent = total;

  // Scores as of moveIdx
  const scores = [0,0];
  for (let i=0;i<moveIdx;i++) scores[REPLAY.moves[i].player] += REPLAY.moves[i].total;
  for (let p=0;p<2;p++){
    document.getElementById(`score${p}`).textContent = scores[p];
  }

  // Highlight which player just moved (the player of the current move)
  for (let p=0;p<2;p++){
    document.getElementById(`pcard${p}`).className = `player-card p${p}`;
    document.getElementById(`badge${p}`).style.display = 'none';
  }
  if (moveIdx > 0){
    const mv = REPLAY.moves[moveIdx-1];
    document.getElementById(`pcard${mv.player}`).className = `player-card p${mv.player} active`;
    document.getElementById(`badge${mv.player}`).style.display = 'inline-block';
  }

  // Shape panel — info about the current move
  const panel = document.getElementById('shape-panel');
  if (moveIdx === 0){
    panel.innerHTML = '<div class="hint">Start of game — press ▶ Next to begin</div>';
  } else if (moveIdx > total){
    panel.innerHTML = '<div class="hint">End of replay</div>';
  } else {
    const mv = REPLAY.moves[moveIdx-1];
    let html = `<div class="shape-name">${mv.shape_names.join(' ')}</div>`;
    html += `<div style="color:#7080a0;font-size:.75em;margin-bottom:4px">${P_NAMES[mv.player]} — Area: ${mv.area.toFixed(1)}</div>`;
    html += `<div class="breakdown-row"><span>Base Score</span><span class="pts">+${mv.base}</span></div>`;
    html += `<div class="breakdown-row"><span>${mv.shape_names.join(' ')} bonus</span><span class="pts">+${mv.bonus}</span></div>`;
    if (mv.gem_bonus > 0){
      const n = mv.claimed_gems ? mv.claimed_gems.length : (mv.gem_bonus/10);
      html += `<div class="breakdown-row"><span>★ Gem ×${n} (claimed now)</span><span class="pts">+${mv.gem_bonus}</span></div>`;
    }
    html += `<div class="total-row"><span>TOTAL</span><span>${mv.total}</span></div>`;
    panel.innerHTML = html;
  }

  // Buttons
  document.getElementById('btn-start').disabled = moveIdx === 0;
  document.getElementById('btn-prev').disabled = moveIdx === 0;
  document.getElementById('btn-next').disabled = moveIdx >= total;
  document.getElementById('btn-end').disabled = moveIdx >= total;
}

function goTo(idx){
  if (!REPLAY) return;
  moveIdx = Math.max(0, Math.min(REPLAY.moves.length, idx));
  render(); updateUI();
}

// ===================== LOADING =====================
function setStatus(msg){
  document.getElementById('status-msg').textContent = msg;
}

function loadReplay(json, sourceLabel){
  try {
    REPLAY = json;
    GEM_PTS = (REPLAY.gems || []).map(g => ({x:g[0], y:g[1]}));
    moveIdx = 0;
    setStatus(sourceLabel ? `Loaded: ${sourceLabel}` : 'Replay loaded');
    render(); updateUI();
  } catch (err) {
    setStatus(`Failed to load replay: ${err.message}`);
  }
}

function loadFromFile(file){
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const json = JSON.parse(e.target.result);
      loadReplay(json, file.name);
    } catch (err) {
      setStatus(`Invalid JSON in ${file.name}: ${err.message}`);
    }
  };
  reader.onerror = () => setStatus(`Could not read ${file.name}`);
  reader.readAsText(file);
}

document.getElementById('btn-load').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFromFile(file);
});

// Try auto-loading replay.json from the same directory (works under http(s)://,
// typically fails under file:// due to CORS/fetch restrictions on local files —
// in that case we just fall back to the file picker prompt).
function tryAutoLoad(){
  fetch('replay.json')
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    })
    .then(json => loadReplay(json, 'replay.json (auto-loaded)'))
    .catch(() => {
      setStatus('No replay.json found — use "Load replay…" to pick a file');
    });
}

// ===================== CONTROLS =====================
document.getElementById('btn-start').addEventListener('click', () => goTo(0));
document.getElementById('btn-prev').addEventListener('click', () => goTo(moveIdx - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(moveIdx + 1));
document.getElementById('btn-end').addEventListener('click', () => goTo(REPLAY ? REPLAY.moves.length : 0));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'){ e.preventDefault(); goTo(moveIdx - 1); }
  else if (e.key === 'ArrowRight'){ e.preventDefault(); goTo(moveIdx + 1); }
});

// ===================== INIT =====================
render();
updateUI();
tryAutoLoad();
</script>
</body>
</html>
